name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install test and bridge dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-test.txt -r bridge/requirements.txt
          python3 -m pip check
      - name: Bridge and renderer tests
        run: python3 -m pytest -q bridge tests apple2gs/test_codex_assets.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cc65 shellcheck
      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-build.txt
          python3 -m pip check
      - name: Cache pinned dos33fsprogs
        id: cache-dos33
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/dos33fsprogs
          key: dos33fsprogs-78fc3bd4b24a6b792f49f311e85412e0cccc272c
      - name: Build pinned dos33fsprogs
        if: steps.cache-dos33.outputs.cache-hit != 'true'
        run: tools/bootstrap-dos33fsprogs.sh
      - name: Verify pinned disk tools
        run: |
          test "$(git -C "$HOME/dos33fsprogs" rev-parse HEAD)" = 78fc3bd4b24a6b792f49f311e85412e0cccc272c
          test -x "$HOME/dos33fsprogs/utils/dos33fs-utils/dos33"
          test -x "$HOME/dos33fsprogs/utils/asoft_basic-utils/tokenize_asoft"
      - name: ShellCheck
        run: |
          shellcheck apple2gs/build.sh tools/install-sd.sh tools/check-release-disk.sh
          shellcheck tools/bootstrap-dos33fsprogs.sh tests/test_release_gate.sh
      - name: Full CODEX disk build
        run: |
          export DOS33FSPROGS="$HOME/dos33fsprogs"
          ./apple2gs/build.sh
      - name: Validate release disk
        run: |
          DOS33FSPROGS="$HOME/dos33fsprogs" ./tools/check-release-disk.sh apple2gs/CODEX.dsk
          DOS33FSPROGS="$HOME/dos33fsprogs" ./tests/test_release_gate.sh apple2gs/CODEX.dsk
          sha256sum apple2gs/CODEX.dsk
